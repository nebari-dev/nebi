name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

# Shares a ref-keyed concurrency group with the Desktop App workflow so the two
# don't race to create the same GitHub release for a v* tag. See desktop.yml.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # macOS signing/notarization credentials for the `notarize` block in
    # .goreleaser.yaml. These reuse the Developer ID cert + App Store Connect
    # API key already configured for the Desktop App workflow (desktop.yml).
    # When absent (e.g. fork PRs) the `isEnvSet` guard skips signing.
    env:
      MACOS_SIGN_P12: ${{ secrets.MACOS_SIGNING_CERT_B64 }}
      MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
      MACOS_NOTARY_KEY: ${{ secrets.APPLE_API_KEY_B64 }}
      MACOS_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install build tools
        run: |
          go mod download
          go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate Swagger docs
        run: swag init -g cmd/nebi/serve.go -o internal/swagger --packageName swagger

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
